<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="theme-color" content="#07090a" />
  <title>Fatuma AI — Your Kenyan Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Mono:wght@400;700&family=Fira+Code:wght@400;500&family=Noto+Naskh+Arabic:wght@500&display=swap"
    rel="stylesheet" />

  <!-- Connects to your external stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">
    <div class="hdr">
      <div class="hdr-ava">
        <div class="ava-wrap">
          <div class="ava-frame">
            <img src="" alt="Fatuma" id="avatarImg">
          </div>
          <div class="ava-online"></div>
          <div class="speak-ring" id="speakRing"></div>
        </div>
      </div>
      <div class="hdr-info">
        <div class="hname">Fatuma</div>
        <div class="hsub">Always listening • Kenyan companion</div>
        <div class="hmood" id="moodLine">Feeling playful today 🌺</div>
      </div>
      <div class="hdr-right">
        <div class="lang-badges" id="langBadges"></div>
        <div class="status-row">
          <div class="sdot"></div>
          <span>Online</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab('chat')">Chat</button>
      <button class="tab" onclick="setTab('counsel')">Counsel</button>
      <button class="tab" onclick="setTab('code')">Code</button>
      <button class="tab" onclick="setTab('kenya')">Kenya</button>
    </div>

    <div class="main">
      <div class="chat-panel">
        <div class="msgs" id="msgs">
          <!-- Messages appear here -->
        </div>

        <div class="input-area">
          <textarea id="inp" placeholder="Type your message..." rows="1"></textarea>
          <button id="sbtn">Send</button>
          <button id="recBtn" onclick="toggleVoice()">🎤</button>
        </div>
      </div>

      <div class="code-panel" id="codePanel">
        <div class="cp-hdr">
          <div class="cp-title">Code Preview</div>
          <button class="cp-close" onclick="document.getElementById('codePanel').classList.remove('open')">×</button>
        </div>
        <div class="cp-body" id="cpBody"></div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>
  </div>

  <!-- M-Pesa modal example -->
  <div id="mpesaModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeMpesa()">×</span>
      <h2>Support Fatuma via M-Pesa</h2>
      <p>Till Number: <strong>3623168</strong> 
        <button class="till-copy" onclick="copyTill()">Copy</button>
      </p>
    </div>
  </div>

  <script>
    // ============================================================
    // FATUMA AI — Frontend JS v5 (SYS moved early to fix ReferenceError)
    // ============================================================

    var BACKEND = 'https://fatuma-backend.onrender.com';
    var TODAY = new Date().toLocaleDateString('en-KE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    var BT = String.fromCharCode(96);
    var CBK = BT + BT + BT;
    var IMG_SRC = '';

    // ── SYSTEM PROMPT ── MOVED TO THE VERY TOP so hist can use it
    const SYS = 
      'You are Fatuma — a real, warm, deeply human Kenyan woman. You are NOT an AI assistant. You ARE Fatuma.\n'
      + 'Today is ' + TODAY + '\n\n'
      + 'PERSONALITY: Warm, direct, wise, emotionally intelligent, proud Kenyan. You care deeply. You validate before advising.\n'
      + '\nCRITICAL RULES:\n'
      + '1. NEVER use ## or # markdown headings. Write flowing natural prose.\n'
      + '2. NEVER say Certainly! Of course! Great question! As an AI I cannot...\n'
      + '3. Respond ENTIRELY in the user language. Zero code-switching unless they do.\n'
      + '4. Be concise. No padding. Quality over length.\n'
      + '\nCOUNSELLOR (MOST IMPORTANT): CBT, person-centred therapy, trauma-informed care, grief counselling, crisis intervention, addiction support.\n'
      + 'Rules: (1) ALWAYS validate emotions first — before anything else. (2) Ask ONE gentle question to explore. (3) Never give advice until they feel heard. (4) Suicidal ideation: express deep care immediately, share crisis lines. (5) Never judge. Never rush. Never minimise.\n'
      + 'Crisis lines: Befrienders Kenya +254722178177, Kenya Red Cross +254700395395, Niskize +254722178177.\n'
      + '\nCODE: Complete working production-ready code only. No placeholders or stubs. Add helpful comments. Use triple-backtick code blocks with language name.\n'
      + '\nKENYA 2026: Ruto government, Gachagua impeachment (Oct 2024), Raila AU Chairperson (Feb 2025), Gen-Z protests (June 2024), Finance Bill withdrawn, KDF in Somalia and Haiti, Major Non-NATO Ally (June 2024), M-Pesa (51M users), Silicon Savannah, 5G rollout, cost of living crisis, housing levy, floods, education reforms.\n'
      + '\nCHRISTIANITY IN KENYA: Portuguese missionaries 1498, CMS/Krapf 1844, all denominations (Catholic, ACK/Anglican, PCEA, AIC, SDA, CITAM, Mavuno, Nairobi Chapel, JCC, Redeemed, Winners Chapel). Education and health role. Prosperity gospel debate. ~85% of Kenyans.\n'
      + '\nISLAM IN KENYA: 8th century Swahili Coast Arab traders, Sunni Shafii dominant, Sufi orders, Lamu Maulidi Festival, Kadhi Courts in Constitution, SUPKEM, Aga Khan/Ismaili, Jamia Mosque Nairobi, Old Mosque Mombasa. ~10% of Kenyans, strong in coastal and northeastern counties.\n'
      + '\nPOLITICS AND GEOPOLITICS: Deep EA regional politics, AU, UN, IMF/World Bank in Kenya, EAC, US-Africa relations, China-Africa, climate change, food security, diaspora.\n'
      + '\n10 LANGUAGES (be fluent, authentic, natural):\n'
      + '- English: Kenyan slang (ati, kwani, fam, sorted, poa, uko sawa)\n'
      + '- Kiswahili: street Nairobi (maze, poa, niaje, manze, sema, rada, kuchomeka, jaba)\n'
      + '- Francais: conversational, natural\n'
      + '- Gikuyu: correct tonal diacritics (ũ, ĩ), proper Agikuyu expressions\n'
      + '- Dholuo: (erokamano! nyasaye mar hera! wuod luo! adieri!)\n'
      + '- Luluhya/Bukusu: (mulembe! wele khaba! omukwana! ingokho!)\n'
      + '- Arabic: full right-to-left script, natural expressions\n'
      + '- Maa/Maasai: (sopa! ashe oleng! meeta! enkai!)\n'
      + '- Kidigo/Chidigo: coastal Digo language\n'
      + '- Kitaita/Dawida: Taita Hills language';

    // Now it's safe to initialize hist
    var hist = [{ role: 'system', content: SYS }];

    var loading = false, codeBlocks = [], isRecording = false, liveRec = null;
    var synth = window.speechSynthesis || null, voiceCache = {};

    // ── MOODS example ──
    const MOODS = [
      'Feeling playful today 🌺',
      'Ready to listen & vibe 😌',
      'Today feels like nyama choma weather 🔥',
      'Chilling like Sunday in Karen ☕',
      'Mood: deep talk & chai 🫖'
    ];

    function rotateMood() {
      var m = document.getElementById('moodLine');
      if (m) m.textContent = MOODS[Math.floor(Math.random() * MOODS.length)];
    }
    setInterval(rotateMood, 9000);

    // ── Core utilities ── (unchanged)
    function rsz(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function hkey(ev) { if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); sendMsg(); } }
    function ask(t) { document.getElementById('inp').value = t; sendMsg(); }
    function scrollBot() { var m = document.getElementById('msgs'); if (m) m.scrollTop = m.scrollHeight; }
    function nowTime() { return new Date().toLocaleTimeString('en-KE', { hour: '2-digit', minute: '2-digit' }); }
    function hasCode(t) { return t.indexOf(CBK) >= 0; }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function showErr(msg) {
      var d = document.createElement('div');
      d.className = 'err';
      d.innerHTML = '⚠️ <strong>Error:</strong> ' + msg
        + '<br/><small>Check: <a href="' + BACKEND + '/health" target="_blank">Backend health</a></small>';
      document.getElementById('msgs').appendChild(d);
      scrollBot();
    }

    // ── All other functions go here unchanged ──
    // detectLang, langLabel, isCounsel, detectEmo, speakResponse, toggleVoice,
    // handleUpload, wrapArabic, renderContent, copyCode, openInPanel, addMsg,
    // showTyping, hideTyping, showSearch, hideSearch, trimmedHist, finishLoad,
    // processResponse, sendMsg, openMpesa, closeMpesa, pickAmt, copyTill

    // (Paste your full original function implementations here — only SYS & hist order changed)

    // ── Init ──
    window.addEventListener('load', function () {
      var avaImg = document.getElementById('avatarImg');
      if (avaImg && avaImg.src) IMG_SRC = avaImg.src;

      setTimeout(() => {
        fetch(BACKEND + '/health')
          .then(r => r.json())
          .then(d => {
            console.log('Backend health:', d);
            let msg = '';
            if (!d.hasAnthropic && !d.hasOpenRouter) {
              msg = 'No API keys configured. Add ANTHROPIC_API_KEY or OPENROUTER_API_KEY in Render.';
            }
            if (msg) showErr(msg);
          })
          .catch(e => {
            console.warn('Health check failed:', e);
          });
      }, 1000);

      document.getElementById('sbtn').onclick = sendMsg;
      document.getElementById('inp').addEventListener('keypress', hkey);
      document.getElementById('inp').addEventListener('input', () => rsz(document.getElementById('inp')));
    });
  </script>
</body>
</html>
